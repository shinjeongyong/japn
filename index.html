<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>후쿠오카 여행 플래너</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
:root{
  --bg:#FBF8F2; --card:#FFFFFF; --ink:#20302E; --muted:#6E7C78;
  --line:#E7E0D3; --pine:#1F4E4A; --pine-2:#2C6B64; --amber:#E0972E;
  --rose:#C96A6A; --sea:#4E93A6; --ok:#2E8B6F;
  --shadow:0 1px 2px rgba(31,78,74,.06), 0 6px 18px rgba(31,78,74,.06);
  --r:16px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;
  -webkit-tap-highlight-color:transparent; line-height:1.5;
  padding-bottom:88px;
}
h1,h2,h3,.disp{font-family:"Gowun Dodum",sans-serif}
button{font-family:inherit; cursor:pointer}
input,select,textarea{font-family:inherit; font-size:16px}

/* ---------- header ---------- */
.hero{position:relative; overflow:hidden; color:#fff; background:linear-gradient(160deg,#22574F,#1B4640 60%,#173B36)}
.hero .wave{position:absolute; inset:0; opacity:.16; background-repeat:repeat; background-size:56px 28px;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='56' height='28' viewBox='0 0 56 28'><path d='M0 28 A28 28 0 0 1 28 0 A28 28 0 0 1 56 28' fill='none' stroke='white' stroke-width='2'/></svg>")}
.hero-in{position:relative; padding:20px 18px 18px; max-width:640px; margin:0 auto}
.brandrow{display:flex; align-items:center; justify-content:space-between; gap:10px}
.brand{display:flex; align-items:baseline; gap:9px}
.brand .jp{font-family:"Gowun Dodum"; font-size:15px; opacity:.7; letter-spacing:1px}
.brand h1{margin:0; font-size:22px; letter-spacing:-.2px}
.me-btn{background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.28); color:#fff;
  padding:7px 12px; border-radius:999px; font-size:13px; display:flex; align-items:center; gap:6px}
.me-btn b{font-weight:600}
.tripmeta{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap}
.chip{background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.22); border-radius:12px;
  padding:8px 12px; font-size:13px; display:flex; flex-direction:column; gap:1px; min-width:74px}
.chip .k{font-size:11px; opacity:.72}
.chip .v{font-size:15px; font-weight:600; font-family:"Gowun Dodum"}
.chip.dday .v{color:#FFDCA0}
.refresh{margin-top:12px; display:flex; align-items:center; gap:8px; font-size:12px; opacity:.85}
.refresh button{background:none; border:none; color:#fff; text-decoration:underline; opacity:.9; font-size:12px; padding:2px}

/* ---------- setup banner ---------- */
.setup{max-width:640px; margin:14px auto 0; padding:0 14px}
.setup .box{background:#FFF6E6; border:1px solid #F0D9A8; border-radius:14px; padding:14px 16px; font-size:14px}
.setup .box b{color:#9A6A12}

/* ---------- tabs ---------- */
.tabbar{position:fixed; left:0; right:0; bottom:0; z-index:40; background:rgba(255,255,255,.94);
  backdrop-filter:blur(8px); border-top:1px solid var(--line); display:flex; padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
.tabbar button{flex:1; background:none; border:none; padding:8px 2px 6px; border-radius:12px;
  display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--muted); font-size:11px}
.tabbar button .ic{font-size:20px; line-height:1}
.tabbar button.active{color:var(--pine)}
.tabbar button.active .ic{transform:translateY(-1px)}

/* ---------- layout ---------- */
main{max-width:640px; margin:0 auto; padding:16px 14px 24px}
.section-h{display:flex; align-items:center; justify-content:space-between; margin:2px 0 12px}
.section-h h2{margin:0; font-size:18px}
.count{font-size:12px; color:var(--muted)}

/* summary strip (shopping) */
.summary{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px}
.summary .s{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:11px 12px; box-shadow:var(--shadow)}
.summary .s .k{font-size:11px; color:var(--muted)}
.summary .s .v{font-size:17px; font-weight:700; font-family:"Gowun Dodum"; margin-top:2px}
.summary .s.yen .v{color:var(--amber)}

/* filters */
.filters{display:flex; gap:7px; overflow-x:auto; padding-bottom:4px; margin-bottom:12px; scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filters button{white-space:nowrap; border:1px solid var(--line); background:var(--card); color:var(--muted);
  padding:7px 13px; border-radius:999px; font-size:13px}
.filters button.on{background:var(--pine); border-color:var(--pine); color:#fff}
.search{width:100%; padding:11px 14px; border:1px solid var(--line); border-radius:12px; background:var(--card);
  margin-bottom:12px; outline:none}
.search:focus{border-color:var(--pine-2)}

/* cards */
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:14px;
  box-shadow:var(--shadow); margin-bottom:10px}
.card.done{opacity:.62}
.card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px}
.card-title{font-size:16px; font-weight:600; word-break:break-word}
.card-title.strike{text-decoration:line-through; color:var(--muted)}
.meta-row{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; align-items:center}
.tag{font-size:11.5px; padding:3px 9px; border-radius:8px; background:#EEF3F1; color:var(--pine); font-weight:500}
.tag.cat{background:#EAF1EF; color:var(--pine-2)}
.tag.region{background:#F0EEE6; color:#7A6A3C}
.tag.baby{background:#FBEDED; color:var(--rose)}
.tag.who{background:transparent; color:var(--muted); padding:3px 0}
.memo{font-size:13.5px; color:var(--muted); margin-top:8px; white-space:pre-wrap}
.card-actions{display:flex; gap:6px; margin-top:12px; flex-wrap:wrap}
.mini{border:1px solid var(--line); background:var(--card); color:var(--pine); border-radius:10px;
  padding:7px 11px; font-size:12.5px; display:inline-flex; align-items:center; gap:5px}
.mini.danger{color:var(--rose)}
.mini.link{color:var(--sea)}
.mini select{border:none; background:none; color:var(--pine); font-size:12.5px; outline:none}
.toggle{margin-left:auto; display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--muted)}
.sw{width:40px; height:23px; border-radius:999px; background:#DFE4E1; position:relative; transition:.15s; flex:none}
.sw::after{content:""; position:absolute; top:2px; left:2px; width:19px; height:19px; border-radius:50%;
  background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.2); transition:.15s}
.sw.on{background:var(--pine)} .sw.on::after{left:19px}
.check{width:24px; height:24px; border-radius:7px; border:2px solid var(--line); flex:none; display:grid; place-items:center; color:#fff}
.check.on{background:var(--ok); border-color:var(--ok)}

/* itinerary */
.day-h{display:flex; align-items:baseline; gap:9px; margin:18px 0 10px}
.day-h .d{font-family:"Gowun Dodum"; font-size:17px; color:var(--pine)}
.day-h .date{font-size:13px; color:var(--muted)}
.day-h .n{font-size:12px; color:var(--muted); margin-left:auto}
.itin-item{display:flex; gap:10px; align-items:flex-start; background:var(--card); border:1px solid var(--line);
  border-radius:14px; padding:12px 13px; margin-bottom:8px; box-shadow:var(--shadow)}
.itin-item .time{font-family:"Gowun Dodum"; font-size:13px; color:var(--amber); min-width:44px; padding-top:1px}
.itin-item .nm{font-weight:600; font-size:15px}
.empty{text-align:center; color:var(--muted); font-size:14px; padding:34px 16px; border:1px dashed var(--line); border-radius:14px}
.empty b{display:block; color:var(--ink); font-family:"Gowun Dodum"; font-size:16px; margin-bottom:6px}

/* FAB + add sheet */
.fab{position:fixed; right:16px; bottom:calc(78px + env(safe-area-inset-bottom)); z-index:45;
  width:56px; height:56px; border-radius:50%; border:none; background:var(--pine); color:#fff;
  font-size:28px; box-shadow:0 8px 22px rgba(31,78,74,.34)}
.scrim{position:fixed; inset:0; background:rgba(20,30,28,.42); z-index:50; display:none}
.scrim.show{display:block}
.sheet{position:fixed; left:0; right:0; bottom:0; z-index:55; background:var(--bg);
  border-radius:22px 22px 0 0; padding:8px 18px calc(20px + env(safe-area-inset-bottom));
  max-width:640px; margin:0 auto; transform:translateY(100%); transition:.22s; max-height:88vh; overflow-y:auto}
.sheet.show{transform:translateY(0)}
.grab{width:40px; height:4px; border-radius:2px; background:var(--line); margin:8px auto 12px}
.sheet h3{margin:2px 0 14px; font-size:18px}
.field{margin-bottom:13px}
.field label{display:block; font-size:12.5px; color:var(--muted); margin-bottom:6px}
.field input,.field select,.field textarea{width:100%; padding:12px 13px; border:1px solid var(--line);
  border-radius:11px; background:var(--card); outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--pine-2)}
.field textarea{resize:vertical; min-height:64px}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.tagpick{display:flex; flex-wrap:wrap; gap:7px}
.tagpick button{border:1px solid var(--line); background:var(--card); color:var(--muted);
  padding:8px 12px; border-radius:999px; font-size:13px}
.tagpick button.on{background:#FBEDED; border-color:var(--rose); color:var(--rose)}
.primary{width:100%; padding:14px; border:none; border-radius:13px; background:var(--pine); color:#fff;
  font-size:15px; font-weight:600; margin-top:4px}
.primary:disabled{opacity:.5}

/* toast */
.toast{position:fixed; left:50%; bottom:calc(96px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:#fff; padding:11px 18px; border-radius:999px; font-size:13.5px; z-index:60;
  opacity:0; pointer-events:none; transition:.2s; white-space:nowrap}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.loading{text-align:center; color:var(--muted); padding:40px; font-size:14px}
.hidden{display:none !important}
</style>
</head>
<body>

<header class="hero">
  <div class="wave"></div>
  <div class="hero-in">
    <div class="brandrow">
      <div class="brand"><span class="jp">福岡</span><h1>후쿠오카 여행</h1></div>
      <button class="me-btn" id="meBtn">🙋 나 · <b id="meName">–</b></button>
    </div>
    <div class="tripmeta" id="tripMeta"></div>
    <div class="refresh"><span id="syncTxt">동기화됨</span> · <button id="reloadBtn">새로고침</button></div>
  </div>
</header>

<div class="setup hidden" id="setupBanner">
  <div class="box">⚙️ <b>설정 필요:</b> index.html 맨 위 <code>GAS_URL</code>에 배포한 웹 앱 주소를 넣어주세요.</div>
</div>

<main id="main"><div class="loading">불러오는 중…</div></main>

<button class="fab hidden" id="fab">＋</button>

<nav class="tabbar" id="tabbar">
  <button data-tab="places" class="active"><span class="ic">📍</span>장소</button>
  <button data-tab="itin"><span class="ic">🗓️</span>일정</button>
  <button data-tab="shop"><span class="ic">🛍️</span>쇼핑</button>
  <button data-tab="baby"><span class="ic">👶</span>아기</button>
  <button data-tab="settings"><span class="ic">⚙️</span>설정</button>
</nav>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"><div class="grab"></div><div id="sheetBody"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   1) 여기에 배포한 GAS 웹 앱 URL을 붙여넣으세요
   ============================================================ */
const GAS_URL = "https://script.google.com/macros/s/AKfycbyjhSLwfFHn3kaA3f5AVe3Cw_IK2UpsPZRzirkIs-WpKaSiE6C7S-bbdGfwLmlA_6n7/exec";

/* ---------- 상수 ---------- */
const PLACE_CATS = ["관광","맛집","카페","쇼핑","기타"];
const REGIONS    = ["하카타","캐널시티","텐진","나카스","다자이후","우미나카","기타"];
const BABY_TAGS  = ["수유실","유모차OK","기저귀교환대","아기의자","키즈메뉴"];
const SHOP_CATS  = ["돈키호테","드럭스토어","기념품","아기용품","식품","기타"];
const INFO_CATS  = ["준비물","시설","이동","식당","기타"];
const WEEK = ["일","월","화","수","목","금","토"];

/* ---------- 상태 ---------- */
let DB = { places:[], shopping:[], baby:[], settings:{} };
let TAB = "places";
let ME = localStorage.getItem("fuk_me") || "";
let filters = { placeCat:"전체", placeBaby:"전체", placeSearch:"", shopCat:"전체" };

/* ---------- 유틸 ---------- */
const $ = s => document.querySelector(s);
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const yen = n => "¥" + Number(n||0).toLocaleString("ja-JP");
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._x); t._x=setTimeout(()=>t.classList.remove("show"),1900); }

function tripDays(){ return (parseInt(DB.settings.nights)||0) + 1; }
function dateForDay(i){ // i: 1-based
  const s = DB.settings.departDate; if(!s) return null;
  const p = String(s).slice(0,10).split("-"); if(p.length<3) return null;
  const d = new Date(+p[0], +p[1]-1, +p[2]); d.setDate(d.getDate()+(i-1)); return d;
}
function fmtDate(d){ return d ? `${d.getMonth()+1}/${d.getDate()}(${WEEK[d.getDay()]})` : ""; }
function members(){ return String(DB.settings.members||"").split(",").map(s=>s.trim()).filter(Boolean); }

/* ---------- API ---------- */
async function api(payload){
  if(!GAS_URL){ throw new Error("GAS_URL 미설정"); }
  const res = await fetch(GAS_URL, { method:"POST", body: JSON.stringify(payload) });
  const data = await res.json();
  if(data && data.error) throw new Error(data.error);
  return data;
}
async function loadAll(){
  $("#syncTxt").textContent = "동기화 중…";
  try{
    const d = await api({action:"getAll"});
    DB = { places:d.places||[], shopping:d.shopping||[], baby:d.baby||[], settings:d.settings||{} };
    $("#syncTxt").textContent = "동기화됨";
    renderHeader(); render();
  }catch(e){
    $("#syncTxt").textContent = "오프라인";
    $("#main").innerHTML = `<div class="empty"><b>연결이 안 돼요</b>${GAS_URL? "네트워크를 확인하고 새로고침을 눌러주세요." : "index.html 맨 위 GAS_URL을 설정해주세요."}</div>`;
  }
}

/* ---------- 헤더 ---------- */
function renderHeader(){
  $("#meName").textContent = ME || "선택";
  const dep = dateForDay(1);
  let dday = "";
  if(dep){ const today=new Date(); today.setHours(0,0,0,0); const diff=Math.round((dep-today)/864e5);
    dday = diff>0?`D-${diff}`:(diff===0?"D-DAY":`D+${-diff}`); }
  const n = parseInt(DB.settings.nights);
  const nights = n>=0 ? `${n}박 ${n+1}일` : "미설정";
  const dateStr = dep ? `${dep.getMonth()+1}/${dep.getDate()} 출발` : "날짜 미설정";
  $("#tripMeta").innerHTML =
    (dday?`<div class="chip dday"><span class="k">카운트다운</span><span class="v">${dday}</span></div>`:"") +
    `<div class="chip"><span class="k">일정</span><span class="v">${nights}</span></div>`+
    `<div class="chip"><span class="k">출발</span><span class="v">${dateStr}</span></div>`+
    `<div class="chip"><span class="k">인원</span><span class="v">${DB.settings.pax||"성인4·아기1"}</span></div>`;
}

/* ---------- 라우팅 ---------- */
function render(){
  const m=$("#main"); $("#fab").classList.toggle("hidden", TAB==="itin"||TAB==="settings");
  if(TAB==="places") renderPlaces(m);
  else if(TAB==="itin") renderItin(m);
  else if(TAB==="shop") renderShop(m);
  else if(TAB==="baby") renderBaby(m);
  else if(TAB==="settings") renderSettings(m);
}

/* ---------- 장소 탭 ---------- */
function renderPlaces(m){
  const catBtns = ["전체",...PLACE_CATS].map(c=>`<button data-f="placeCat" data-v="${c}" class="${filters.placeCat===c?"on":""}">${c}</button>`).join("");
  const babyBtns= ["전체",...BABY_TAGS].map(c=>`<button data-f="placeBaby" data-v="${c}" class="${filters.placeBaby===c?"on":""}">${c==="전체"?"아기 전체":c}</button>`).join("");
  let list = DB.places.slice().reverse();
  if(filters.placeCat!=="전체") list=list.filter(p=>p.category===filters.placeCat);
  if(filters.placeBaby!=="전체") list=list.filter(p=>String(p.babyTags||"").includes(filters.placeBaby));
  if(filters.placeSearch){ const q=filters.placeSearch.toLowerCase();
    list=list.filter(p=>[p.name,p.memo,p.region].some(v=>String(v||"").toLowerCase().includes(q))); }

  m.innerHTML = `
    <div class="section-h"><h2>가고 싶은 곳</h2><span class="count">${DB.places.length}곳</span></div>
    <input class="search" id="placeSearch" placeholder="이름·지역·메모 검색" value="${esc(filters.placeSearch)}">
    <div class="filters">${catBtns}</div>
    <div class="filters">${babyBtns}</div>
    <div id="placeList">${ list.length ? list.map(placeCard).join("") :
      `<div class="empty"><b>아직 비어 있어요</b>＋ 버튼으로 가고 싶은 곳을 추가해보세요.</div>` }</div>`;
}
function dayOptions(cur){
  let o = `<option value="0" ${!cur||cur==0?"selected":""}>요일 미정</option>`;
  for(let i=1;i<=Math.max(tripDays(),1);i++){ const d=dateForDay(i);
    o+=`<option value="${i}" ${cur==i?"selected":""}>Day${i}${d?" "+fmtDate(d):""}</option>`; }
  return o;
}
function placeCard(p){
  const confirmed = p.status==="확정";
  const baby = String(p.babyTags||"").split(",").map(s=>s.trim()).filter(Boolean);
  const mapQ = encodeURIComponent(`후쿠오카 ${p.region||""} ${p.name}`);
  const eatQ = encodeURIComponent(`핫페퍼 타베로그 후쿠오카 ${p.region||""} ${p.name}`);
  return `<div class="card" data-id="${p.id}">
    <div class="card-top"><div class="card-title">${esc(p.name)}</div>
      <label class="toggle">${confirmed?"확정":"위시"}<span class="sw ${confirmed?"on":""}" data-act="toggleStatus"></span></label></div>
    <div class="meta-row">
      ${p.category?`<span class="tag cat">${esc(p.category)}</span>`:""}
      ${p.region?`<span class="tag region">${esc(p.region)}</span>`:""}
      ${baby.map(b=>`<span class="tag baby">👶${esc(b)}</span>`).join("")}
      ${p.addedBy?`<span class="tag who">· ${esc(p.addedBy)}</span>`:""}
    </div>
    ${p.memo?`<div class="memo">${esc(p.memo)}</div>`:""}
    <div class="card-actions">
      <span class="mini" data-act="none">🗓️ <select data-act="setDay">${dayOptions(p.day)}</select></span>
      <a class="mini link" href="https://www.google.com/maps/search/?api=1&query=${mapQ}" target="_blank" rel="noopener">🗺️ 지도</a>
      <a class="mini link" href="https://www.google.com/search?q=${eatQ}" target="_blank" rel="noopener">🔎 추천검색</a>
      <button class="mini danger" data-act="del">삭제</button>
    </div></div>`;
}

/* ---------- 일정 탭 ---------- */
function renderItin(m){
  const confirmed = DB.places.filter(p=>p.status==="확정");
  const days = Math.max(tripDays(),1);
  let html = `<div class="section-h"><h2>Day별 일정</h2><span class="count">확정 ${confirmed.length}곳</span></div>`;
  for(let i=1;i<=days;i++){
    const d=dateForDay(i);
    const items = confirmed.filter(p=>p.day==i).sort((a,b)=>String(a.timeMemo||"").localeCompare(String(b.timeMemo||"")));
    html += `<div class="day-h"><span class="d">Day ${i}</span><span class="date">${d?fmtDate(d):""}</span><span class="n">${items.length}곳</span></div>`;
    html += items.length ? items.map(itinItem).join("")
      : `<div class="empty" style="padding:20px">장소 탭에서 '확정' 후 Day를 지정하면 여기 담겨요.</div>`;
  }
  const undated = confirmed.filter(p=>!p.day||p.day==0);
  if(undated.length){ html+=`<div class="day-h"><span class="d">요일 미정</span><span class="n">${undated.length}곳</span></div>`+undated.map(itinItem).join(""); }
  const wish = DB.places.filter(p=>p.status!=="확정").length;
  if(wish) html+=`<div class="empty" style="margin-top:14px">위시리스트 ${wish}곳이 더 있어요 · 장소 탭에서 확정해보세요.</div>`;
  m.innerHTML = html;
}
function itinItem(p){
  return `<div class="itin-item"><div class="time">${esc(p.timeMemo||"—")}</div>
    <div><div class="nm">${esc(p.name)}</div>
    <div class="meta-row">${p.category?`<span class="tag cat">${esc(p.category)}</span>`:""}${p.region?`<span class="tag region">${esc(p.region)}</span>`:""}</div></div></div>`;
}

/* ---------- 쇼핑 탭 ---------- */
function renderShop(m){
  const items = DB.shopping;
  const total = items.reduce((s,i)=>s+(Number(i.price)||0)*(Number(i.qty)||1),0);
  const done = items.filter(i=>i.bought===true||i.bought==="TRUE").length;
  const catBtns = ["전체",...SHOP_CATS].map(c=>`<button data-f="shopCat" data-v="${c}" class="${filters.shopCat===c?"on":""}">${c}</button>`).join("");
  let list = items.slice().reverse();
  if(filters.shopCat!=="전체") list=list.filter(i=>i.category===filters.shopCat);
  m.innerHTML = `
    <div class="section-h"><h2>쇼핑 · 용품</h2><span class="count">${items.length}개</span></div>
    <div class="summary">
      <div class="s"><div class="k">전체</div><div class="v">${items.length}개</div></div>
      <div class="s"><div class="k">구매완료</div><div class="v">${done}개</div></div>
      <div class="s yen"><div class="k">예상 합계</div><div class="v">${yen(total)}</div></div>
    </div>
    <div class="filters">${catBtns}</div>
    <div id="shopList">${ list.length ? list.map(shopCard).join("") :
      `<div class="empty"><b>살 것을 담아보세요</b>＋ 버튼으로 용품·기념품을 추가할 수 있어요.</div>` }</div>`;
}
function shopCard(i){
  const bought = i.bought===true||i.bought==="TRUE";
  const q = Number(i.qty)||1;
  const line = (Number(i.price)||0)*q;
  const amzn = `https://www.amazon.co.jp/s?k=${encodeURIComponent(i.item)}`;
  const goog = `https://www.google.com/search?q=${encodeURIComponent(i.item+" 価格")}`;
  return `<div class="card ${bought?"done":""}" data-id="${i.id}">
    <div class="card-top" style="align-items:center">
      <div style="display:flex; gap:11px; align-items:center">
        <div class="check ${bought?"on":""}" data-act="toggleBought">${bought?"✓":""}</div>
        <div><div class="card-title ${bought?"strike":""}" style="font-size:15px">${esc(i.item)}${q>1?` <span style="color:var(--muted); font-size:13px">×${q}</span>`:""}</div>
        <div class="meta-row" style="margin-top:5px">${i.category?`<span class="tag cat">${esc(i.category)}</span>`:""}${i.addedBy?`<span class="tag who">· ${esc(i.addedBy)}</span>`:""}</div></div>
      </div>
      <div style="font-family:'Gowun Dodum'; color:var(--amber); font-weight:700; white-space:nowrap">${i.price?yen(line):""}</div>
    </div>
    ${i.memo?`<div class="memo">${esc(i.memo)}</div>`:""}
    <div class="card-actions">
      <a class="mini link" href="${amzn}" target="_blank" rel="noopener">🛒 아마존JP</a>
      <a class="mini link" href="${goog}" target="_blank" rel="noopener">🔎 가격검색</a>
      <button class="mini" data-act="editShop">가격입력</button>
      <button class="mini danger" data-act="del">삭제</button>
    </div></div>`;
}

/* ---------- 아기 탭 ---------- */
function renderBaby(m){
  const infos = DB.baby.slice().reverse();
  const babyPlaces = DB.places.filter(p=>String(p.babyTags||"").trim());
  let html = `<div class="section-h"><h2>아기 편의</h2><span class="count">메모 ${DB.baby.length}</span></div>`;
  html += infos.length ? infos.map(infoCard).join("")
    : `<div class="empty"><b>아기 메모를 남겨보세요</b>준비물·수유·이동 팁을 ＋로 추가할 수 있어요.</div>`;
  html += `<div class="section-h" style="margin-top:22px"><h2>아기 친화 장소</h2><span class="count">${babyPlaces.length}곳</span></div>`;
  html += babyPlaces.length ? babyPlaces.map(p=>{
      const baby=String(p.babyTags).split(",").map(s=>s.trim()).filter(Boolean);
      return `<div class="card" style="padding:12px 14px"><div class="card-title" style="font-size:15px">${esc(p.name)}</div>
        <div class="meta-row">${p.region?`<span class="tag region">${esc(p.region)}</span>`:""}${baby.map(b=>`<span class="tag baby">👶${esc(b)}</span>`).join("")}</div></div>`;
    }).join("")
    : `<div class="empty" style="padding:20px">장소를 추가할 때 아기 태그(수유실·유모차OK 등)를 달면 여기 모여요.</div>`;
  m.innerHTML = html;
}
function infoCard(i){
  return `<div class="card" data-id="${i.id}">
    <div class="card-top"><div class="card-title" style="font-size:15px">${esc(i.title)}</div>
      ${i.category?`<span class="tag cat">${esc(i.category)}</span>`:""}</div>
    ${i.content?`<div class="memo">${esc(i.content)}</div>`:""}
    <div class="card-actions">${i.addedBy?`<span class="tag who">· ${esc(i.addedBy)}</span>`:""}
      <button class="mini danger" data-act="del" style="margin-left:auto">삭제</button></div></div>`;
}

/* ---------- 설정 탭 ---------- */
function renderSettings(m){
  const s = DB.settings;
  m.innerHTML = `
    <div class="section-h"><h2>여행 설정</h2></div>
    <div class="card">
      <div class="field"><label>출발일</label><input type="date" id="setDepart" value="${esc((s.departDate||"").toString().slice(0,10))}"></div>
      <div class="row2">
        <div class="field"><label>박수 (2박3일 → 2)</label><input type="number" id="setNights" min="0" max="14" value="${esc(s.nights!=null?s.nights:2)}"></div>
        <div class="field"><label>인원 표기</label><input id="setPax" placeholder="성인4·아기1" value="${esc(s.pax||"성인4·아기1")}"></div>
      </div>
      <div class="field"><label>같이 가는 사람 (쉼표로 구분)</label><input id="setMembers" placeholder="예) 정용,아내,형,형수" value="${esc(s.members||"")}"></div>
      <button class="primary" id="saveSettings">저장</button>
    </div>
    <div class="empty" style="margin-top:16px; text-align:left; padding:16px">
      <b style="font-size:14px">v1 안내</b>
      저장 방식은 구글시트라 4명이 각자 폰에서 같이 채울 수 있어요. 가격 자동입력·핫페퍼 연동은 v2에서 얹을 예정이에요.
    </div>`;
}

/* ============================================================
   추가 시트 (＋ FAB)
   ============================================================ */
let tagSel = [];
function openSheet(){
  if(TAB==="places") sheetPlace();
  else if(TAB==="shop") sheetShop();
  else if(TAB==="baby") sheetBaby();
  showSheet();
}
function showSheet(){ $("#scrim").classList.add("show"); $("#sheet").classList.add("show"); }
function closeSheet(){ $("#scrim").classList.remove("show"); $("#sheet").classList.remove("show"); }

function sheetPlace(){
  tagSel=[];
  $("#sheetBody").innerHTML = `<h3>가고 싶은 곳 추가</h3>
    <div class="field"><label>이름</label><input id="f_name" placeholder="예) 캐널시티 하카타"></div>
    <div class="row2">
      <div class="field"><label>분류</label><select id="f_cat">${PLACE_CATS.map(c=>`<option>${c}</option>`).join("")}</select></div>
      <div class="field"><label>지역</label><select id="f_region">${REGIONS.map(c=>`<option>${c}</option>`).join("")}</select></div>
    </div>
    <div class="field"><label>아기 편의 태그</label><div class="tagpick" id="f_baby">${BABY_TAGS.map(t=>`<button type="button" data-t="${t}">${t}</button>`).join("")}</div></div>
    <div class="field"><label>메모 (선택)</label><textarea id="f_memo" placeholder="영업시간, 팁 등"></textarea></div>
    <button class="primary" id="f_save">추가하기</button>`;
  $("#f_baby").onclick=e=>{ const b=e.target.closest("button"); if(!b)return; const t=b.dataset.t;
    if(tagSel.includes(t)){ tagSel=tagSel.filter(x=>x!==t); b.classList.remove("on"); } else { tagSel.push(t); b.classList.add("on"); } };
  $("#f_save").onclick=async()=>{
    const name=$("#f_name").value.trim(); if(!name) return toast("이름을 입력해주세요");
    await addItem("places",{ name, category:$("#f_cat").value, region:$("#f_region").value,
      babyTags:tagSel.join(","), memo:$("#f_memo").value.trim(), status:"위시", day:0, timeMemo:"", addedBy:ME });
  };
}
function sheetShop(){
  $("#sheetBody").innerHTML = `<h3>쇼핑 · 용품 추가</h3>
    <div class="field"><label>품목</label><input id="f_item" placeholder="예) 곤약젤리"></div>
    <div class="row2">
      <div class="field"><label>분류</label><select id="f_cat">${SHOP_CATS.map(c=>`<option>${c}</option>`).join("")}</select></div>
      <div class="field"><label>수량</label><input type="number" id="f_qty" value="1" min="1"></div>
    </div>
    <div class="field"><label>예상가격 (¥, 선택)</label><input type="number" id="f_price" placeholder="아직 모르면 비워두세요"></div>
    <div class="field"><label>메모 (선택)</label><input id="f_memo" placeholder="어디서 살지 등"></div>
    <button class="primary" id="f_save">추가하기</button>`;
  $("#f_save").onclick=async()=>{
    const item=$("#f_item").value.trim(); if(!item) return toast("품목을 입력해주세요");
    await addItem("shopping",{ item, category:$("#f_cat").value, price:$("#f_price").value||0,
      qty:$("#f_qty").value||1, memo:$("#f_memo").value.trim(), bought:false, addedBy:ME });
  };
}
function sheetBaby(){
  $("#sheetBody").innerHTML = `<h3>아기 메모 추가</h3>
    <div class="field"><label>제목</label><input id="f_title" placeholder="예) 하카타역 수유실 위치"></div>
    <div class="field"><label>분류</label><select id="f_cat">${INFO_CATS.map(c=>`<option>${c}</option>`).join("")}</select></div>
    <div class="field"><label>내용</label><textarea id="f_content" placeholder="자세한 내용을 적어주세요"></textarea></div>
    <button class="primary" id="f_save">추가하기</button>`;
  $("#f_save").onclick=async()=>{
    const title=$("#f_title").value.trim(); if(!title) return toast("제목을 입력해주세요");
    await addItem("baby",{ title, category:$("#f_cat").value, content:$("#f_content").value.trim(), addedBy:ME });
  };
}

/* ---------- 공통 액션 ---------- */
async function addItem(type,data){
  const btn=$("#f_save"); btn.disabled=true; btn.textContent="추가 중…";
  try{ await api({action:"add",type,data}); closeSheet(); toast("추가했어요"); await loadAll(); }
  catch(e){ toast("실패: "+e.message); btn.disabled=false; btn.textContent="추가하기"; }
}
async function updateItem(type,data){
  try{ await api({action:"update",type,data}); await loadAll(); }
  catch(e){ toast("실패: "+e.message); }
}
async function delItem(type,id){
  if(!confirm("삭제할까요?")) return;
  try{ await api({action:"delete",type,id}); toast("삭제했어요"); await loadAll(); }
  catch(e){ toast("실패: "+e.message); }
}

/* ---------- 이벤트 위임 ---------- */
$("#main").addEventListener("click", e=>{
  const f=e.target.closest("[data-f]");
  if(f){ filters[f.dataset.f]=f.dataset.v; render(); return; }
  const card=e.target.closest("[data-id]"); if(!card) return;
  const id=card.dataset.id; const act=(e.target.closest("[data-act]")||{}).dataset?.act;

  if(act==="del"){ const type = TAB==="shop"?"shopping":(TAB==="baby"?"baby":"places"); delItem(type,id); }
  else if(act==="toggleStatus"){ const p=DB.places.find(x=>x.id==id); updateItem("places",{id,status:p.status==="확정"?"위시":"확정"}); }
  else if(act==="toggleBought"){ const i=DB.shopping.find(x=>x.id==id); const b=i.bought===true||i.bought==="TRUE"; updateItem("shopping",{id,bought:!b}); }
  else if(act==="editShop"){ editShopPrice(id); }
});
$("#main").addEventListener("change", e=>{
  const sel=e.target.closest("[data-act='setDay']"); if(!sel) return;
  const id=e.target.closest("[data-id]").dataset.id;
  updateItem("places",{id, day:parseInt(sel.value), status:"확정"});
});
$("#main").addEventListener("input", e=>{
  if(e.target.id==="placeSearch"){ filters.placeSearch=e.target.value;
    const list=$("#placeList"); if(list){ // 부분 렌더로 포커스 유지
      let arr=DB.places.slice().reverse();
      if(filters.placeCat!=="전체") arr=arr.filter(p=>p.category===filters.placeCat);
      if(filters.placeBaby!=="전체") arr=arr.filter(p=>String(p.babyTags||"").includes(filters.placeBaby));
      const q=filters.placeSearch.toLowerCase();
      if(q) arr=arr.filter(p=>[p.name,p.memo,p.region].some(v=>String(v||"").toLowerCase().includes(q)));
      list.innerHTML = arr.length?arr.map(placeCard).join(""):`<div class="empty">검색 결과가 없어요.</div>`;
    }
  }
});
function editShopPrice(id){
  const i=DB.shopping.find(x=>x.id==id); if(!i) return;
  const p=prompt(`"${i.item}" 예상가격 (¥)`, i.price||"");
  if(p===null) return; const q=prompt("수량", i.qty||1); if(q===null) return;
  updateItem("shopping",{id, price:Number(p)||0, qty:Number(q)||1});
}

/* ---------- 탭/FAB/멤버 ---------- */
$("#tabbar").addEventListener("click", e=>{
  const b=e.target.closest("[data-tab]"); if(!b) return;
  TAB=b.dataset.tab;
  document.querySelectorAll(".tabbar button").forEach(x=>x.classList.toggle("active",x===b));
  render();
});
$("#fab").addEventListener("click", ()=>{ if(!ME && members().length){ pickMe(true); return; } openSheet(); });
$("#scrim").addEventListener("click", closeSheet);
$("#reloadBtn").addEventListener("click", loadAll);
$("#meBtn").addEventListener("click", ()=>pickMe());

function pickMe(afterOpen){
  const list=members();
  if(!list.length){ toast("설정 탭에서 이름을 먼저 등록해주세요"); TAB="settings"; render(); return; }
  const cur=list.indexOf(ME); const next=list[(cur+1)%list.length];
  ME=next; localStorage.setItem("fuk_me",ME); renderHeader();
  toast(`나 = ${ME}`); if(afterOpen) openSheet();
}

/* 설정 저장 (설정 탭은 위임 밖이라 별도 바인딩) */
document.body.addEventListener("click", async e=>{
  if(e.target.id!=="saveSettings") return;
  const data={ departDate:$("#setDepart").value, nights:$("#setNights").value,
    pax:$("#setPax").value.trim(), members:$("#setMembers").value.trim() };
  e.target.disabled=true; e.target.textContent="저장 중…";
  try{ await api({action:"saveSettings",data}); DB.settings=data;
    if(!ME && members().length){ ME=members()[0]; localStorage.setItem("fuk_me",ME); }
    toast("저장했어요"); renderHeader(); render(); }
  catch(err){ toast("실패: "+err.message); }
  e.target.disabled=false; e.target.textContent="저장";
});

/* ---------- 시작 ---------- */
if(!GAS_URL){ $("#setupBanner").classList.remove("hidden"); }
loadAll();
</script>
</body>
</html>
